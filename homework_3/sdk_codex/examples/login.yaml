openapi: 3.0.3
info:
  title: Login API
  version: 1.0.0
paths:
  /api/login:
    post:
      summary: Authenticate a user and return a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          description: Invalid credentials
        '422':
          description: Validation error (missing or malformed fields)
